<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>Blackjack Trainer</h1>

<div id="tableWrapper">

    <div id="bj-table"></div>

    <div id="gameSettings">
        <label>Decks:
            <select id="numDecksSelect">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6" selected>6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>
        </label>

        <label>Dealer Soft 17:
            <select id="S17Select">
                <option value="false">Stand (S17)</option>
                <option value="true" selected>Hit (H17)</option>
            </select>
        </label>

        <label>Players:
            <select id="numPlayersSelect">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select>
        </label>

        <label>
            <input type="checkbox" id="trainerToggle">
            Show Correct Move
        </label>
    </div>

    <div id="controls">
        <button id="startBtn">Start Game</button>
        <button id="hitBtn">Hit</button>
        <button id="standBtn">Stand</button>
        <button id="doubleBtn">Double</button>
        <button id="splitBtn">Split</button>
        <button id="simulateBtn">Simulate</button>
        <button id="nextRoundBtn">Next Round</button>
    </div>

</div>

<script src="script.js" type="module"></script>
</body>
</html>
