<head>
    <meta charset="UTF-8">
    <title>Blackjack Trainer</title>
    <style>
        body {font-family: Arial, Helvetica, sans-serif; font-size: 16px}
        .activeHand {background-color: #f0f0f0; padding: 5px;}
        .playerArea {margin-bottom: 20px;}
        .hand {margin-left: 10px; margin-bottom: 10px;}
    </style>
</head>


<body>

<h1>Blackjack Trainer</h1>

<div id="game"></div>

<div id="controls">
    <button id="startBtn">Start Game</button>
    <button id="hitBtn">Hit</button>
    <button id="standBtn">Stand</button>
    <button id="doubleBtn">Double</button>
    <button id="splitBtn">Split</button>
    <button id="simulateBtn">Simulation</button>
</div>

<script src="script.js"></script>

</body>
