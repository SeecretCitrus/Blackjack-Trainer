<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Top bar -->
<div id="topBar">
    <h1>Blackjack Trainer</h1>
    <a href="simulation.html" id="simulateBtn" class="btn-link">Simulator ↗</a>
</div>

<div id="mainLayout">

    <!-- ── LEFT: Collapsible rules panel ── -->
    <div id="rulesPanel">
        <button id="rulesPanelToggle" class="rules-toggle-btn">
            <span id="rulesPanelArrow">◀</span> Rules
        </button>
        <div id="rulesPanelInner">
            <div class="rules-section-title">Game rules</div>

            <label class="rules-label">Decks
                <select id="numDecksSelect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6" selected>6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </label>

            <label class="rules-label">Dealer Soft 17
                <select id="S17Select">
                    <option value="false">Stand (S17)</option>
                    <option value="true" selected>Hit (H17)</option>
                </select>
            </label>

            <label class="rules-label">Players
                <select id="numPlayersSelect">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </label>

            <label class="rules-label">Min Bet $
                <input type="number" id="minBetInput" class="rule-input" value="15" min="1" step="1">
            </label>

            <label class="rules-label">Buy-in $
                <input type="number" id="startBalInput" class="rule-input" value="100" min="1" step="10">
            </label>

            <div class="rules-section-title" style="margin-top:12px">Bots</div>
            <div id="botSettings"></div>
        </div>
    </div>

    <!-- ── CENTER: Table + controls ── -->
    <div id="centerCol">

        <div id="bj-table"></div>

        <!-- Always-visible trainer toggles -->
        <div id="trainerBar">
            <label class="trainer-toggle-label">
                <input type="checkbox" id="trainerToggle">
                <span>Show Correct Move</span>
            </label>
            <label class="trainer-toggle-label">
                <input type="checkbox" id="countToggle">
                <span>Card Counting</span>
            </label>
            <label class="trainer-toggle-label" id="countSystemLabel" style="display:none">
                <select id="countSystemSelect">
                    <option value="hilo">Hi-Lo</option>
                    <option value="omega2">Omega II</option>
                </select>
            </label>
        </div>

        <!-- Bet inputs -->
        <div id="betPanel"></div>

        <!-- Action buttons -->
        <div id="controls">
            <button id="startBtn">Start Game</button>
            <button id="hitBtn">Hit</button>
            <button id="standBtn">Stand</button>
            <button id="doubleBtn">Double</button>
            <button id="splitBtn">Split</button>
            <button id="nextRoundBtn">Next Round</button>
        </div>

        <!-- Card counting display -->
        <div id="countPanel"></div>

        <!-- Strategy explanation -->
        <div id="explanationPanel"></div>

        <!-- Resupply notifications -->
        <div id="resupplyPanel"></div>

        <!-- Live balance editor -->
        <div id="balanceEditor"></div>

    </div>

</div>

<script src="script.js" type="module"></script>
</body>
</html>
