<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>Blackjack Trainer</h1>

<div id="tableWrapper">

    <div id="bj-table"></div>

    <!-- Settings row -->
    <div id="gameSettings">
        <label>Decks:
            <select id="numDecksSelect">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6" selected>6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>
        </label>

        <label>Dealer Soft 17:
            <select id="S17Select">
                <option value="false">Stand (S17)</option>
                <option value="true" selected>Hit (H17)</option>
            </select>
        </label>

        <label>Players:
            <select id="numPlayersSelect">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select>
        </label>

        <label>Min Bet: $<input type="number" id="minBetInput" class="rule-input" value="15" min="1" step="1"></label>
        <label>Buy-in: $<input type="number" id="startBalInput" class="rule-input" value="100" min="1" step="10"></label>

        <label>
            <input type="checkbox" id="trainerToggle">
            Show Correct Move
        </label>
    </div>

    <!-- Bot toggles -->
    <div id="botSettings"></div>

    <!-- Bet inputs (shown before each round) -->
    <div id="betPanel"></div>

    <!-- Action buttons -->
    <div id="controls">
        <button id="startBtn">Start Game</button>
        <button id="hitBtn">Hit</button>
        <button id="standBtn">Stand</button>
        <button id="doubleBtn">Double</button>
        <button id="splitBtn">Split</button>
        <a href="simulation.html" id="simulateBtn" class="btn-link">Simulator ↗</a>
        <button id="nextRoundBtn">Next Round</button>
    </div>

    <!-- Strategy explanation -->
    <div id="explanationPanel"></div>

    <!-- Resupply notifications -->
    <div id="resupplyPanel"></div>

    <!-- Live balance editor -->
    <div id="balanceEditor"></div>

</div>

<script src="script.js" type="module"></script>
</body>
</html>
